<!DOCTYPE html>
<html>
<head>
    <title>NASA APOD</title>

    <style>
        body {
            text-align: center;
            margin: 0%;
            padding: 0%;
        }

        .container {
            width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        .section {
            margin-bottom: 20px;
        }

        img, video, iframe {
        max-width: 100%;
        height: auto;
        }

        p {
        text-align: left;
        line-height: 1.6;
        }

        .loader p {
        text-align: center;
        font size: 18px;
        margin-top: 10px;}

        .loader {
        display: none;
        margin-top: 30px;
        text-align: center;
        }

        .spinner {
            display: block;
            width: 40px;
            height: 40px;
            border: 4px solid #ccc;
            border-top: 4px solid black;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
            

    </style>
  
</head>

<body >

    <div class="container">

    <h1>NASA APOD</h1>

    <form method="GET" class="section">
        <input type="date" name="date" value="{{ request.GET.date|default:today }}">
        <button type="submit">Get APOD</button>
    </form>
    
    <div id="loader" class="loader">
        <div class="spinner"></div>
        
            <p>Loading... Please wait</p>
        
    </div>

{% for apod in apod_list %}
    <div class="section">
    
        <h2>{{ apod.title }}</h2>
    </div> 

    <div class="section">
       
        {% if apod.media_type == "image" %}
            <img src="{{ apod.url }}" width="400" >
        
        {% elif apod.media_type == "video" %}
 
            {% if "youtube" in apod.url or "youtu.be" in apod.url %}
                <iframe width="600" height="400"
                src="{{ apod.url }}"
                frameborder = "0" allowfullscreen
                ></iframe>
            {% else %}
                <video width="400" controls>
                    <source src="{{apod.url}}" type="video/mp4">
                </video>
            {% endif %}
        {% endif %}
    </div>

    <div class="section">
        <p>{{ apod.explanation }}</p>
       
    </div>    
{% endfor %} 
    </div>
    <script>
        document.querySelector("form").addEventListener("submit", function() {
        document.getElementById("loader").style.display = "block";
        document.querySelector("button").disabled = true; });
    </script>
</body>
</html>
